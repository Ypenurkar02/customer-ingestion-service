spring.application.name=customer-ingestion-service

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:customer_ingestion}
spring.datasource.username=${DATABASE_USERNAME:customer_ingestion}
spring.datasource.password=${DATABASE_PASSWORD:customer_ingestion}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

ingestion.chunk-size=${INGESTION_CHUNK_SIZE:1000}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
