services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customer_ingestion
      POSTGRES_USER: customer_ingestion
      POSTGRES_PASSWORD: customer_ingestion
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_ingestion -d customer_ingestion"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: customer_ingestion
      DATABASE_USERNAME: customer_ingestion
      DATABASE_PASSWORD: customer_ingestion
      INGESTION_CHUNK_SIZE: 1000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
