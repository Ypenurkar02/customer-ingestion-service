spring.application.name=customer-ingestion-service

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:customer_ingestion}?reWriteBatchedInserts=true
spring.datasource.username=${DATABASE_USERNAME:customer_ingestion}
spring.datasource.password=${DATABASE_PASSWORD:customer_ingestion}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

ingestion.chunk-size=${INGESTION_CHUNK_SIZE:1000}
ingestion.max-reported-failures=${INGESTION_MAX_REPORTED_FAILURES:1000}
ingestion.max-reported-duplicate-external-ids=${INGESTION_MAX_REPORTED_DUPLICATES:1000}
ingestion.lookup-cache-ttl=${INGESTION_LOOKUP_CACHE_TTL:5m}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
